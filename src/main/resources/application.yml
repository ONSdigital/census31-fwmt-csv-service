server:
  port: 8060

spring:
  application:
    name: census31-fwmt-csvservice
  security:
    user:
      name: "user"
      password: "password"

management:
  # Place /info and /health in the root
  endpoints.web.base-path: ''
  endpoint:
    health:
      show-details: always

logging:
  profile: DEV
  level:
    root: WARN
    uk.gov.ons.census.fwmt: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate: INFO
    org.apache.commons.dbcp2: INFO
    org.springframework: INFO

gcpBucket:
#  celocation: "gs://csv-bucket-test/ceTestCSV.csv"
#  ccslocation: "gs://csv-bucket-test/ccsTestCSV.csv"
#  addresschecklocation: "gs://csv-bucket-test/AC.csv"
#  postcodelookuplocation: "gs://csv-bucket-test/addressLookup.csv"
#  directory: "gs://csv-bucket-test/"

  celocation: "file://${home}/acceptance/data/ceTestCSV.csv"
  ccslocation: "file://${home}/acceptance/data/ccsTestCSV.csv"
  addresschecklocation: "file://${home}/acceptance/data/AC.csv"
  postcodelookuplocation: "file://${home}/acceptance/data/addressLookup.csv"
  directory: "file://${home}/acceptance/data/"

app:
  testing: false
  retry:
    initialInterval: 5000
    multiplier: 3.0
    maxInterval: 45000
  messaging:
    provider: pubsub
    destinations:
      gatewayActions: "Gateway.Actions.Exchange"

---
spring:
  config:
    activate:
      on-property:
        name: app.messaging.provider
        having-value: pubsub
  cloud:
    gcp:
      project-id: ${FWMT_PUBSUB_PROJECT:fwmt-local}
      credentials:
        enabled: false
      pubsub:
        enabled: true
        emulator-host: ${PUBSUB_EMULATOR_HOST:localhost:8085}
